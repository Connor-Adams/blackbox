name: promote-to-production

# Production deploys happen ONLY when a GitHub Release is published — never on
# merge to main. Publishing a release re-tags the already-built GHCR image to
# :production (+ a :vX.Y.Z rollback tag) and tells Railway to redeploy. Railway
# pulls :production; the container's CMD runs DB migrations then starts.
#
# Mirrors cashflow's promote-to-production.yml, collapsed to one service. Images
# are NOT rebuilt here — build-images.yml already pushed :sha-<commit>.

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

concurrency:
  group: promote-to-production
  cancel-in-progress: false

env:
  # How long to wait for build-images to finish, in case publishing a release
  # races a still-running build of the same commit.
  IMAGE_WAIT_ATTEMPTS: 30
  IMAGE_WAIT_SECONDS: 10

jobs:
  promote:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
      REPO: ${{ github.repository }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
    steps:
      # Check out the released commit so we resolve the exact image build-images
      # pushed for it. `ref: <tag>` resolves annotated tags to their commit.
      - name: Check out release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Railway CLI
        # Pinned: @railway/cli 4.66.1 (2026-06-03) sends a GraphQL query with a
        # `deletedAt` field on VolumeInstance that Railway's API rejects, crashing
        # `railway redeploy` ("Cannot query field deletedAt on type VolumeInstance").
        # 4.66.0 is the last version that promotes cleanly. Bump deliberately after
        # verifying redeploy works against the live API.
        run: npm install -g @railway/cli@4.66.0

      - name: Promote image to production and redeploy
        run: |
          set -euo pipefail

          if [ -z "${RAILWAY_TOKEN}" ]; then
            echo "RAILWAY_TOKEN secret is not set" >&2
            exit 1
          fi
          if [ -z "${RAILWAY_SERVICE_ID}" ]; then
            echo "RAILWAY_SERVICE_ID secret is not set" >&2
            exit 1
          fi

          REPO_LC=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${REPO_LC}"

          # Resolve the source image by the released commit's FULL 40-char SHA —
          # the same value build-images.yml tagged with :sha-${{ github.sha }}.
          # Matching on the full SHA (never an abbreviation) avoids the
          # short-SHA-length mismatch class of bugs entirely.
          RELEASE_SHA=$(git rev-parse HEAD)
          SRC="${IMAGE}:sha-${RELEASE_SHA}"
          echo "Promoting release $RELEASE_TAG (commit $RELEASE_SHA)"
          echo "Source image: $SRC"

          # Wait for the source image — covers a release racing a still-running
          # build of the same commit. Fall back to :main if the sha tag never
          # materializes (e.g. the build was skipped via paths-ignore).
          ready=""
          for attempt in $(seq 1 "$IMAGE_WAIT_ATTEMPTS"); do
            if docker buildx imagetools inspect "$SRC" > /dev/null 2>&1; then
              ready=1
              break
            fi
            if [ "$attempt" -lt "$IMAGE_WAIT_ATTEMPTS" ]; then
              echo "  $SRC not ready (attempt $attempt/$IMAGE_WAIT_ATTEMPTS); waiting ${IMAGE_WAIT_SECONDS}s..."
              sleep "$IMAGE_WAIT_SECONDS"
            fi
          done
          if [ -z "$ready" ]; then
            echo "Source image $SRC not available after $(( IMAGE_WAIT_ATTEMPTS * IMAGE_WAIT_SECONDS ))s; falling back to ${IMAGE}:main" >&2
            SRC="${IMAGE}:main"
            if ! docker buildx imagetools inspect "$SRC" > /dev/null 2>&1; then
              echo "Fallback image $SRC does not exist either; aborting." >&2
              exit 1
            fi
          fi

          # Re-tag the resolved image to the version tag (rollback anchor) and to
          # :production. `imagetools create` is a registry-side manifest copy —
          # no pull, no rebuild.
          echo "Re-tagging $SRC -> ${IMAGE}:${RELEASE_TAG} and ${IMAGE}:production"
          docker buildx imagetools create --tag "${IMAGE}:${RELEASE_TAG}" "$SRC"
          docker buildx imagetools create --tag "${IMAGE}:production" "$SRC"

          # Tell Railway to pull the freshly-tagged :production image and redeploy.
          echo "Redeploying Railway service ${RAILWAY_SERVICE_ID}"
          railway redeploy --service "${RAILWAY_SERVICE_ID}" -y
