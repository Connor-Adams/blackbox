name: CI

# Lint/typecheck/test/build the single Next.js app on every push to main and on
# every PR. This does NOT build or push the Docker image (build-images.yml does
# that on push:main) and does NOT deploy.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Exercise both supported Node majors (package.json engines: ">=20").
      # The production image runs Node 22.
      matrix:
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          # The repo has no `packageManager` field, so action-setup can't infer
          # the version — pin it (matches the Dockerfile's pnpm@10).
          version: 10

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
